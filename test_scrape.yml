name: Test Scrape

on:
  workflow_dispatch:   # تشغيل يدوي فقط -- للاختبار قبل اعتماد السكربت الكامل

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test scraper
        run: python scraper_test.py

      # ملاحظة: ما نسوي commit/push هنا عمدًا -- الهدف بس نشوف الـ output
      # ونتأكد البيانات صح قبل لا نعتمد السكربت الكامل
