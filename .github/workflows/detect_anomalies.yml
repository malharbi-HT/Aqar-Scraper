name: Detect Anomalies (Sale)

on:
  workflow_dispatch:   # تشغيل يدوي فقط -- تحليل يشتغل عند الطلب

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas scikit-learn

      - name: Detect anomalies
        run: python detect_anomalies.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/listings_sale_anomalies.csv data/listings_sale_normal.csv
          git commit -m "Anomaly detection results $(date +'%Y-%m-%d')" || echo "No changes to commit"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "محاولة $i فشلت، إعادة محاولة بعد ثوانٍ..."
            sleep 5
          done
